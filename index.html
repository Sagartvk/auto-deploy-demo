<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Deploy CI/CD</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1d2b64, #f8cdda);
      color: #fff;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      width: 60%;
      margin: auto;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .status {
      margin-top: 20px;
      font-size: 20px;
      color: #00ffcc;
      font-weight: bold;
    }

    .footer {
      margin-top: 50px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <h1>🚀 Sagar Ibrahim</h1>

      <p>
        This application is automatically deployed using
        <strong>GitHub Actions</strong>, <strong>Docker</strong>, and <strong>AWS EC2</strong>.
      </p>

      <p>
        Every code push triggers a new build and updates the live application
        without any manual intervention.
      </p>

      <div class="status">
        ✅ Auto Deployment Successful
      </div>

      <div class="footer">
        Created by Sagar Ibrahim | DevOps Demo Project
      </div>

    </div>
  </div>

</body>
</html>
